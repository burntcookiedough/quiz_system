<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structured Canvas - Focus Mode</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            /* Structured Canvas Palette */
            --bg-oatmeal: #F4F2EC;
            --surface-white: #FFFFFF;
            --ink-black: #111111;
            --ink-light: #555555;
            --taupe-border: #D6D2C4;
            --terra-cotta: #D85C41;
            --forest-pine: #2D5A4C;

            /* Typography */
            --font-display: 'Space Grotesk', sans-serif;
            --font-data: 'JetBrains Mono', monospace;

            /* Structural Variables */
            --hard-shadow: 6px 6px 0px var(--ink-black);
            --hard-shadow-sm: 3px 3px 0px var(--ink-black);
            --transition-snappy: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-oatmeal);
            color: var(--ink-black);
            font-family: var(--font-display);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            /* Subtle architectural grid */
            background-image:
                linear-gradient(var(--taupe-border) 1px, transparent 1px),
                linear-gradient(90deg, var(--taupe-border) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center top;
        }

        /* --- GLOBAL PROGRESS BAR --- */
        .global-progress-bar {
            width: 100%;
            height: 6px;
            background-color: var(--taupe-border);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .global-progress-fill {
            height: 100%;
            width: 20%;
            /* Example: 3 out of 15 questions */
            background-color: var(--ink-black);
            transition: width 0.3s ease;
        }

        /* --- MINIMAL TOPBAR --- */
        .focus-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            margin-top: 6px;
            /* Offset for progress bar */
        }

        .btn-ghost {
            background: transparent;
            border: none;
            font-family: var(--font-data);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--ink-light);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition-snappy);
        }

        .btn-ghost:hover {
            color: var(--terra-cotta);
        }

        .status-tracker {
            text-align: center;
        }

        .status-label {
            font-family: var(--font-data);
            font-size: 0.75rem;
            color: var(--ink-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.25rem;
        }

        .status-numbers {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 700;
        }

        .timer {
            font-family: var(--font-data);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--ink-black);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.5rem 1rem;
            border: 2px solid var(--ink-black);
            background: var(--surface-white);
            box-shadow: var(--hard-shadow-sm);
        }

        /* --- QUESTION CANVAS --- */
        .focus-canvas {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow-y: auto;
        }

        .question-container {
            width: 100%;
            max-width: 800px;
        }

        /* Question Meta (Tags) */
        .question-meta {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .tag {
            font-family: var(--font-data);
            font-size: 0.75rem;
            font-weight: 700;
            background: var(--ink-black);
            color: var(--surface-white);
            padding: 0.25rem 0.5rem;
            text-transform: uppercase;
        }

        .tag-outline {
            background: transparent;
            color: var(--ink-black);
            border: 1px solid var(--ink-black);
        }

        /* The Prompt */
        .question-text {
            font-size: 2.25rem;
            font-weight: 500;
            line-height: 1.3;
            letter-spacing: -0.5px;
            margin-bottom: 3rem;
            color: var(--ink-black);
        }

        /* Brutalist Multiple Choice Options */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 1.5rem 2rem;
            background: var(--surface-white);
            border: 2px solid var(--ink-black);
            cursor: pointer;
            transition: var(--transition-snappy);
            position: relative;
        }

        /* Hide the default radio input */
        .option-label input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        /* The custom architectural radio square */
        .custom-radio {
            width: 24px;
            height: 24px;
            border: 2px solid var(--ink-black);
            margin-right: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-snappy);
        }

        .custom-radio::after {
            content: "";
            width: 12px;
            height: 12px;
            background: var(--ink-black);
            display: none;
            /* Hidden by default */
        }

        .option-text {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 500;
        }

        .option-key {
            margin-left: auto;
            font-family: var(--font-data);
            font-size: 0.85rem;
            color: var(--ink-light);
            border: 1px solid var(--taupe-border);
            padding: 0.25rem 0.5rem;
        }

        /* Hover State */
        .option-label:hover {
            transform: translate(-2px, -2px);
            box-shadow: var(--hard-shadow);
        }

        /* Selected (Checked) State */
        .option-label input[type="radio"]:checked~.custom-radio::after {
            display: block;
            /* Show inner square */
        }

        .option-label:has(input[type="radio"]:checked) {
            background: var(--ink-black);
            color: var(--surface-white);
            transform: translate(-2px, -2px);
            box-shadow: var(--hard-shadow);
        }

        .option-label:has(input[type="radio"]:checked) .custom-radio {
            border-color: var(--surface-white);
        }

        .option-label:has(input[type="radio"]:checked) .custom-radio::after {
            background: var(--surface-white);
        }

        .option-label:has(input[type="radio"]:checked) .option-key {
            color: var(--surface-white);
            border-color: var(--ink-light);
        }

        /* --- BOTTOM NAVIGATION --- */
        .focus-footer {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 0 4rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-nav {
            padding: 1rem 2rem;
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition-snappy);
            border: 2px solid var(--ink-black);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-prev {
            background: var(--bg-oatmeal);
            color: var(--ink-black);
        }

        .btn-prev:hover {
            background: var(--surface-white);
            transform: translate(-2px, -2px);
            box-shadow: var(--hard-shadow-sm);
        }

        .btn-next {
            background: var(--ink-black);
            color: var(--surface-white);
        }

        .btn-next:hover {
            background: var(--surface-white);
            color: var(--ink-black);
            transform: translate(-2px, -2px);
            box-shadow: var(--hard-shadow);
        }
    </style>
</head>

<body>

    <div class="global-progress-bar">
        <div class="global-progress-fill"></div>
    </div>

    <header class="focus-topbar">
        <button class="btn-ghost">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Save & Exit
        </button>

        <div class="status-tracker">
            <div class="status-label">Question</div>
            <div class="status-numbers">03 <span style="color: var(--ink-light); font-weight: 400;">/ 15</span></div>
        </div>

        <div class="timer">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            42:15
        </div>
    </header>

    <main class="focus-canvas">
        <article class="question-container">

            <div class="question-meta">
                <span class="tag">Multiple Choice</span>
                <span class="tag tag-outline">10 Pts</span>
            </div>

            <h2 class="question-text">
                A car accelerates uniformly from rest to a speed of 25 m/s in 8.0 seconds. What is the acceleration?
            </h2>

            <div class="options-grid">

                <label class="option-label">
                    <input type="radio" name="q3" value="A">
                    <div class="custom-radio"></div>
                    <span class="option-text">2.5 m/s²</span>
                    <span class="option-key">A</span>
                </label>

                <label class="option-label">
                    <input type="radio" name="q3" value="B">
                    <div class="custom-radio"></div>
                    <span class="option-text">3.1 m/s²</span>
                    <span class="option-key">B</span>
                </label>

                <label class="option-label">
                    <input type="radio" name="q3" value="C">
                    <div class="custom-radio"></div>
                    <span class="option-text">4.0 m/s²</span>
                    <span class="option-key">C</span>
                </label>

                <label class="option-label">
                    <input type="radio" name="q3" value="D">
                    <div class="custom-radio"></div>
                    <span class="option-text">200 m/s²</span>
                    <span class="option-key">D</span>
                </label>

            </div>

        </article>

        <footer class="focus-footer">
            <button class="btn-nav btn-prev">
                Previous
            </button>

            <button class="btn-nav btn-next">
                Next Question
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </footer>
    </main>

</body>

</html>
