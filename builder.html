<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structured Canvas - Quiz Builder</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            /* Structured Canvas Palette */
            --bg-oatmeal: #F4F2EC;
            --surface-white: #FFFFFF;
            --ink-black: #111111;
            --ink-light: #555555;
            --taupe-border: #D6D2C4;
            --terra-cotta: #D85C41;
            --forest-pine: #2D5A4C;

            /* Typography */
            --font-display: 'Space Grotesk', sans-serif;
            --font-data: 'JetBrains Mono', monospace;

            /* Structural Variables */
            --hard-shadow: 6px 6px 0px var(--ink-black);
            --hard-shadow-sm: 3px 3px 0px var(--ink-black);
            --transition-snappy: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-oatmeal);
            color: var(--ink-black);
            font-family: var(--font-display);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR (Persistent) --- */
        .sidebar {
            width: 280px;
            background-color: var(--bg-oatmeal);
            border-right: 2px solid var(--ink-black);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            z-index: 10;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            width: 24px;
            height: 24px;
            background-color: var(--terra-cotta);
            border: 2px solid var(--ink-black);
            border-radius: 2px;
        }

        .nav-group {
            margin-bottom: 2rem;
        }

        .nav-label {
            font-family: var(--font-data);
            font-size: 0.75rem;
            color: var(--ink-light);
            text-transform: uppercase;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.75rem 1rem;
            text-decoration: none;
            color: var(--ink-black);
            font-weight: 500;
            border: 2px solid transparent;
            border-radius: 2px;
            margin-bottom: 0.5rem;
            transition: var(--transition-snappy);
        }

        .nav-item:hover {
            border-color: var(--ink-black);
            background-color: var(--surface-white);
            box-shadow: var(--hard-shadow-sm);
            transform: translate(-2px, -2px);
        }

        .nav-item.active {
            background-color: var(--ink-black);
            color: var(--surface-white);
        }

        /* --- MAIN CANVAS --- */
        .main-canvas {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background-image:
                linear-gradient(var(--taupe-border) 1px, transparent 1px),
                linear-gradient(90deg, var(--taupe-border) 1px, transparent 1px);
            background-size: 40px 40px;
            scroll-behavior: smooth;
        }

        /* Topbar */
        .topbar {
            background-color: var(--surface-white);
            border-bottom: 2px solid var(--ink-black);
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .breadcrumb {
            font-family: var(--font-data);
            font-size: 0.85rem;
            color: var(--ink-light);
        }

        .breadcrumb span {
            color: var(--ink-black);
            font-weight: 700;
        }

        .btn-action {
            background-color: var(--forest-pine);
            color: var(--surface-white);
            border: 2px solid var(--ink-black);
            padding: 0.75rem 1.5rem;
            font-family: var(--font-display);
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: var(--hard-shadow-sm);
            transition: var(--transition-snappy);
        }

        .btn-action:hover {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px var(--ink-black);
        }

        /* --- EDITOR WORKSPACE --- */
        .editor-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 2rem 8rem 2rem;
            width: 100%;
        }

        /* Document Header */
        .doc-header {
            margin-bottom: 3rem;
        }

        .input-title {
            width: 100%;
            background: transparent;
            border: none;
            font-family: var(--font-display);
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--ink-black);
            letter-spacing: -1.5px;
            outline: none;
            margin-bottom: 1rem;
            line-height: 1.1;
        }

        .input-title::placeholder {
            color: var(--taupe-border);
        }

        .input-desc {
            width: 100%;
            background: transparent;
            border: none;
            font-family: var(--font-display);
            font-size: 1.25rem;
            color: var(--ink-light);
            outline: none;
            resize: none;
            overflow: hidden;
        }

        /* Block Elements */
        .block {
            background: var(--surface-white);
            border: 2px solid var(--ink-black);
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
            box-shadow: var(--hard-shadow);
            transition: var(--transition-snappy);
        }

        .block:focus-within {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px var(--ink-black);
            border-color: var(--terra-cotta);
        }

        /* Drag Handle Affordance */
        .drag-handle {
            position: absolute;
            left: -40px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--ink-light);
            cursor: grab;
            opacity: 0.3;
            transition: opacity 0.2s;
        }

        .block:hover .drag-handle {
            opacity: 1;
        }

        /* Block Header (Settings) */
        .block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--taupe-border);
        }

        .block-type {
            font-family: var(--font-data);
            font-size: 0.75rem;
            font-weight: 700;
            background: var(--ink-black);
            color: var(--surface-white);
            padding: 0.25rem 0.5rem;
            text-transform: uppercase;
        }

        .block-settings {
            display: flex;
            gap: 1rem;
            align-items: center;
            font-family: var(--font-data);
            font-size: 0.85rem;
        }

        .input-points {
            width: 40px;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--ink-black);
            font-family: var(--font-data);
            font-weight: 700;
            text-align: center;
            outline: none;
        }

        /* Block Content */
        .input-question {
            width: 100%;
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 500;
            border: none;
            background: transparent;
            outline: none;
            margin-bottom: 1.5rem;
            resize: none;
        }

        /* Multiple Choice Options */
        .options-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .option-indicator {
            width: 20px;
            height: 20px;
            border: 2px solid var(--ink-black);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .option-item.correct .option-indicator {
            background-color: var(--forest-pine);
            border-color: var(--forest-pine);
        }

        .input-option {
            flex: 1;
            font-family: var(--font-display);
            font-size: 1.1rem;
            padding: 0.5rem;
            border: 1px solid transparent;
            background: transparent;
            outline: none;
            transition: var(--transition-snappy);
        }

        .input-option:focus {
            border-bottom: 2px solid var(--ink-black);
        }

        .btn-add-option {
            font-family: var(--font-data);
            font-size: 0.85rem;
            color: var(--ink-light);
            background: transparent;
            border: none;
            cursor: pointer;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-add-option:hover {
            color: var(--ink-black);
        }

        /* Add Block Button */
        .add-block-btn {
            width: 100%;
            padding: 2rem;
            background: transparent;
            border: 2px dashed var(--taupe-border);
            color: var(--ink-light);
            font-family: var(--font-data);
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition-snappy);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .add-block-btn:hover {
            border-style: solid;
            border-color: var(--ink-black);
            background: var(--surface-white);
            color: var(--ink-black);
            box-shadow: var(--hard-shadow);
            transform: translate(-2px, -2px);
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon"></div>
            Struct
        </div>

        <div class="nav-group">
            <div class="nav-label">Workspace</div>
            <a href="#" class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="3" y1="9" x2="21" y2="9"></line>
                    <line x1="9" y1="21" x2="9" y2="9"></line>
                </svg>
                Dashboard
            </a>
            <a href="#" class="nav-item active">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                Quiz Builder
            </a>
            <a href="#" class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                Roster
            </a>
        </div>
    </aside>

    <main class="main-canvas">

        <header class="topbar">
            <div class="breadcrumb">
                WORKSPACE / <span>QUIZ BUILDER</span>
            </div>
            <button class="btn-action">Publish Module</button>
        </header>

        <div class="editor-container">

            <div class="doc-header">
                <input type="text" class="input-title" placeholder="Untitled Assignment..."
                    value="Advanced Physics: Kinematics">
                <textarea class="input-desc" rows="2"
                    placeholder="Add instructions or an optional description...">Please complete all problems. Show your work on paper where applicable.</textarea>
            </div>

            <div class="block">
                <svg class="drag-handle" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <circle cx="9" cy="5" r="1"></circle>
                    <circle cx="9" cy="12" r="1"></circle>
                    <circle cx="9" cy="19" r="1"></circle>
                    <circle cx="15" cy="5" r="1"></circle>
                    <circle cx="15" cy="12" r="1"></circle>
                    <circle cx="15" cy="19" r="1"></circle>
                </svg>

                <div class="block-header">
                    <span class="block-type">Multiple Choice</span>
                    <div class="block-settings">
                        Required: <input type="checkbox" checked style="accent-color: var(--ink-black);">
                        Pts: <input type="text" class="input-points" value="10">
                    </div>
                </div>

                <textarea class="input-question" rows="2"
                    placeholder="Write your question here...">A car accelerates uniformly from rest to a speed of 25 m/s in 8.0 seconds. What is the acceleration?</textarea>

                <ul class="options-list">
                    <li class="option-item">
                        <div class="option-indicator"></div>
                        <input type="text" class="input-option" value="2.5 m/s²">
                    </li>
                    <li class="option-item correct">
                        <div class="option-indicator">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                        </div>
                        <input type="text" class="input-option" value="3.1 m/s²">
                    </li>
                    <li class="option-item">
                        <div class="option-indicator"></div>
                        <input type="text" class="input-option" value="4.0 m/s²">
                    </li>
                    <li class="option-item">
                        <div class="option-indicator"></div>
                        <input type="text" class="input-option" value="200 m/s²">
                    </li>
                </ul>
                <button class="btn-add-option">+ Add Option</button>
            </div>

            <div class="block">
                <svg class="drag-handle" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <circle cx="9" cy="5" r="1"></circle>
                    <circle cx="9" cy="12" r="1"></circle>
                    <circle cx="9" cy="19" r="1"></circle>
                    <circle cx="15" cy="5" r="1"></circle>
                    <circle cx="15" cy="12" r="1"></circle>
                    <circle cx="15" cy="19" r="1"></circle>
                </svg>

                <div class="block-header">
                    <span class="block-type" style="background: var(--terra-cotta);">Short Answer</span>
                    <div class="block-settings">
                        Required: <input type="checkbox" checked style="accent-color: var(--ink-black);">
                        Pts: <input type="text" class="input-points" value="15">
                    </div>
                </div>

                <textarea class="input-question" rows="2"
                    placeholder="Write your question here...">Define Newton's First Law of Motion and provide a real-world example.</textarea>

                <textarea disabled
                    style="width: 100%; height: 100px; background: var(--bg-oatmeal); border: 2px dashed var(--taupe-border); padding: 1rem; font-family: var(--font-data); color: var(--ink-light); resize: none;">[ Student will enter their text response here ]</textarea>
            </div>

            <button class="add-block-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Add Content Block
            </button>

        </div>
    </main>

</body>

</html>
