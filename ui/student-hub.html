<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structured Canvas - Student Hub</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Specific student hub overrides not in base style.css */
        .brand-icon {
            border-radius: 50%;
            /* Circle instead of square for student */
            background-color: var(--forest-pine);
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: var(--font-data);
            font-size: 0.85rem;
            font-weight: 700;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border: 2px solid var(--ink-black);
            background-color: var(--bg-oatmeal);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hub-container {
            max-width: 1000px;
            padding: 3rem;
            margin: 0 auto;
            width: 100%;
        }

        .welcome-header {
            margin-bottom: 3rem;
        }

        .welcome-header h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            line-height: 1.1;
        }

        .welcome-header p {
            font-family: var(--font-data);
            color: var(--ink-light);
            font-size: 1rem;
        }

        .section-title {
            font-family: var(--font-data);
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--ink-black);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .task-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .task-card {
            background: var(--surface-white);
            border: 2px solid var(--ink-black);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            box-shadow: var(--hard-shadow);
            transition: var(--transition-snappy);
            position: relative;
        }

        .task-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px var(--ink-black);
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .course-tag {
            font-family: var(--font-data);
            font-size: 0.7rem;
            font-weight: 700;
            background: var(--ink-black);
            color: var(--surface-white);
            padding: 0.25rem 0.5rem;
            text-transform: uppercase;
        }

        .due-date {
            font-family: var(--font-data);
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--terra-cotta);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .task-card h3 {
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .task-card p {
            font-family: var(--font-data);
            font-size: 0.85rem;
            color: var(--ink-light);
            margin-bottom: 2rem;
            flex: 1;
        }

        .progress-container {
            margin-bottom: 1.5rem;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-family: var(--font-data);
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .progress-track {
            width: 100%;
            height: 12px;
            border: 2px solid var(--ink-black);
            background: var(--bg-oatmeal);
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--forest-pine);
            border-right: 2px solid var(--ink-black);
        }

        .btn-card {
            width: 100%;
            padding: 1rem;
            background: transparent;
            border: 2px solid var(--ink-black);
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition-snappy);
            text-align: center;
            display: inline-block;
            text-decoration: none;
            color: var(--ink-black);
        }

        .btn-card:hover {
            background: var(--terra-cotta);
            color: var(--surface-white);
        }

        .task-card.completed {
            background: var(--bg-oatmeal);
            border-color: var(--taupe-border);
            box-shadow: none;
            opacity: 0.8;
        }

        .task-card.completed:hover {
            transform: none;
            box-shadow: none;
            opacity: 1;
            border-color: var(--ink-black);
        }

        .task-card.completed .progress-fill {
            background: var(--ink-light);
        }

        .task-card.completed .btn-card {
            display: none;
        }

        .score-badge {
            font-family: var(--font-data);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--forest-pine);
            margin-top: 1rem;
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon"></div>
            Struct
        </div>

        <div class="nav-group">
            <div class="nav-label">Student Hub</div>
            <a href="/student-hub.html" class="nav-item active">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
                Active Tasks
            </a>
            <a href="/student-reports.html" class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                Grades & Reports
            </a>
        </div>
        <div class="nav-group" style="margin-top: auto; margin-bottom: 0;">
            <a href="/index.html" class="nav-item" style="color: var(--terra-cotta); border-color: transparent;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Switch Role
            </a>
        </div>
    </aside>

    <main class="main-canvas">

        <header class="topbar">
            <div class="breadcrumb">
                STRUCT / <span>STUDENT HUB</span>
            </div>
            <div class="user-badge">
                L. Crain
                <div class="user-avatar">LC</div>
            </div>
        </header>

        <div class="hub-container">

            <div class="welcome-header">
                <h1>Ready to work?</h1>
                <p id="pending-subtitle">Fetching assignments...</p>
            </div>

            <div class="section-title">
                Action Required
                <span id="pending-count" style="color: var(--terra-cotta);">Pending...</span>
            </div>

            <div class="task-grid" id="active-tasks-grid">
                <!-- Dynamically populated via JS -->
            </div>

            <div class="section-title">
                Recently Completed
                <span style="color: var(--ink-light);">This Week</span>
            </div>

            <div class="task-grid" id="completed-tasks-grid">
                <!-- Dynamically populated via JS -->
            </div>

        </div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Mock student ID for now
                const studentId = 'student_dummy';
                const data = await window.StructAPI.getStudentDashboard(studentId);

                const activeCount = data.activeAssignments ? data.activeAssignments.length : 0;
                document.getElementById('pending-subtitle').textContent = `You have ${activeCount} assignments pending.`;
                document.getElementById('pending-count').textContent = `${activeCount} Pending`;

                const activeGrid = document.getElementById('active-tasks-grid');
                activeGrid.innerHTML = '';

                if (data.activeAssignments && activeCount > 0) {
                    data.activeAssignments.forEach(task => {
                        const html = `
                        <div class="task-card">
                            <div class="card-meta">
                                <span class="course-tag">Course Assignment</span>
                                <div class="due-date">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="12" cy="12" r="10"></circle>
                                        <polyline points="12 6 12 12 16 14"></polyline>
                                    </svg>
                                    PENDING
                                </div>
                            </div>
                            <h3>${task.title}</h3>
                            
                            <div class="progress-container" style="flex: 1;">
                                <div class="progress-label">
                                    <span>${task.totalMarks} Points Available</span>
                                    <span style="color: var(--forest-pine);">0% Complete</span>
                                </div>
                                <div class="progress-track" style="background: var(--surface-white);">
                                    <div class="progress-fill" style="width: 5%;"></div>
                                </div>
                            </div>

                            <button class="btn-card" onclick="window.location.href='/quiz-take.html?quizId=${task.id}'" style="margin-top: auto;">
                                Begin Assignment
                            </button>
                        </div>
                        `;
                        activeGrid.insertAdjacentHTML('beforeend', html);
                    });
                } else {
                    activeGrid.innerHTML = '<p>No active assignments. Great job!</p>';
                }

                const compGrid = document.getElementById('completed-tasks-grid');
                compGrid.innerHTML = '';

                if (data.completedAssignments && data.completedAssignments.length > 0) {
                    data.completedAssignments.forEach(comp => {
                        const scorePct = Math.round((comp.score / comp.total) * 100);
                        const html = `
                        <div class="task-card completed">
                            <div class="card-meta">
                                <span class="course-tag" style="background: var(--ink-light);">Completed</span>
                                <div class="due-date" style="color: var(--forest-pine);">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                                    </svg>
                                    SUBMITTED
                                </div>
                            </div>
                            <h3>${comp.quizTitle}</h3>
                            <div class="score-badge">Score: ${scorePct}%</div>
                        </div>
                        `;
                        compGrid.insertAdjacentHTML('beforeend', html);
                    });
                } else {
                    compGrid.innerHTML = '<p>No recently completed assignments.</p>';
                }

            } catch (err) {
                console.error("Failed to load student dashboard:", err);
            }
        });
    </script>
</body>

</html>
