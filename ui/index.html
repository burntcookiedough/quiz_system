<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structured Canvas - Portal</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .portal-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
        }

        .portal-cards {
            display: flex;
            gap: 2rem;
            margin-top: 3rem;
        }

        .portal-card {
            background: var(--surface-white);
            border: 2px solid var(--ink-black);
            padding: 3rem;
            width: 300px;
            text-align: center;
            box-shadow: var(--hard-shadow);
            transition: var(--transition-snappy);
            cursor: pointer;
            text-decoration: none;
            color: var(--ink-black);
            display: block;
        }

        .portal-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px var(--ink-black);
            border-color: var(--terra-cotta);
        }
    </style>
</head>

<body>
    <main class="main-canvas" style="align-items: center; justify-content: center;">
        <div class="portal-container">
            <h1 style="font-size: 3rem; letter-spacing: -1px; margin-bottom: 0.5rem;">Struct Platform</h1>
            <p style="font-family: var(--font-data); color: var(--ink-light);">Select your workspace environment</p>

            <div class="portal-cards">
                <a href="/teacher-dashboard.html" class="portal-card">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--terra-cotta)"
                        stroke-width="2" style="margin-bottom: 1.5rem;">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="3" y1="9" x2="21" y2="9"></line>
                        <line x1="9" y1="21" x2="9" y2="9"></line>
                    </svg>
                    <h2 style="font-size: 1.5rem;">Teacher View</h2>
                    <p
                        style="font-family: var(--font-data); font-size: 0.8rem; margin-top: 0.5rem; color: var(--ink-light);">
                        Dashboard & Builder</p>
                </a>

                <a href="/student-hub.html" class="portal-card">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--forest-pine)"
                        stroke-width="2" style="margin-bottom: 1.5rem;">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <h2 style="font-size: 1.5rem;">Student Hub</h2>
                    <p
                        style="font-family: var(--font-data); font-size: 0.8rem; margin-top: 0.5rem; color: var(--ink-light);">
                        Assignments & Grades</p>
                </a>
            </div>
        </div>
    </main>
</body>

</html>
