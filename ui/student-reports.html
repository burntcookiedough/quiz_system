<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structured Canvas - Grades & Reports</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .brand-icon {
            border-radius: 50%;
            background-color: var(--forest-pine);
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: var(--font-data);
            font-size: 0.85rem;
            font-weight: 700;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border: 2px solid var(--ink-black);
            background-color: var(--bg-oatmeal);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hub-container {
            max-width: 1000px;
            padding: 3rem;
            margin: 0 auto;
            width: 100%;
        }

        .header-section {
            margin-bottom: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 3px solid var(--ink-black);
            padding-bottom: 1.5rem;
        }

        .header-section h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            line-height: 1.1;
        }

        .header-section p {
            font-family: var(--font-data);
            color: var(--ink-light);
            font-size: 1rem;
        }

        .gpa-block {
            text-align: right;
        }

        .gpa-label {
            font-family: var(--font-data);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--ink-light);
        }

        .gpa-value {
            font-family: var(--font-display);
            font-size: 3rem;
            font-weight: 700;
            color: var(--forest-pine);
            line-height: 1;
        }

        .report-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .report-card {
            background: var(--surface-white);
            border: 2px solid var(--ink-black);
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: var(--transition-snappy);
        }

        .report-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 8px 8px 0px var(--ink-black);
        }

        .report-info h3 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .report-info p {
            font-family: var(--font-data);
            font-size: 0.9rem;
            color: var(--ink-light);
        }

        .report-score-box {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .score-bar-bg {
            width: 200px;
            height: 12px;
            background: var(--bg-oatmeal);
            border: 2px solid var(--ink-black);
        }

        .score-bar-fill {
            height: 100%;
            background: var(--forest-pine);
            border-right: 2px solid var(--ink-black);
        }

        .score-text {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            min-width: 60px;
            text-align: right;
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            border: 2px dashed var(--taupe-border);
            color: var(--ink-light);
            font-family: var(--font-data);
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon"></div>
            Struct
        </div>

        <div class="nav-group">
            <div class="nav-label">Student Hub</div>
            <a href="/student-hub.html" class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
                Active Tasks
            </a>
            <a href="/student-reports.html" class="nav-item active">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                Grades & Reports
            </a>
        </div>
        <div class="nav-group" style="margin-top: auto; margin-bottom: 0;">
            <a href="/index.html" class="nav-item" style="color: var(--terra-cotta); border-color: transparent;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Switch Role
            </a>
        </div>
    </aside>

    <main class="main-canvas">

        <header class="topbar">
            <div class="breadcrumb">
                STRUCT / <span>GRADES & REPORTS</span>
            </div>
            <div class="user-badge">
                L. Crain
                <div class="user-avatar">LC</div>
            </div>
        </header>

        <div class="hub-container">

            <div class="header-section">
                <div>
                    <h1>Academic Record</h1>
                    <p>Review your historical assignment performance.</p>
                </div>
                <div class="gpa-block">
                    <div class="gpa-label">Cumulative GPA Equivalent</div>
                    <div class="gpa-value" id="overall-grade">--%</div>
                </div>
            </div>

            <div class="report-grid" id="report-grid">
                <!-- Dynamically populated via JS -->
            </div>

        </div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Mock student ID for now
                const studentId = 'student_dummy';
                const data = await window.StructAPI.getStudentDashboard(studentId);

                const reportGrid = document.getElementById('report-grid');
                reportGrid.innerHTML = '';

                if (data.completedAssignments && data.completedAssignments.length > 0) {
                    let totalScore = 0;
                    let totalMax = 0;

                    data.completedAssignments.forEach(comp => {
                        totalScore += comp.score;
                        totalMax += comp.total;

                        const scorePct = Math.round((comp.score / comp.total) * 100);
                        let barColor = 'var(--forest-pine)';
                        if (scorePct < 60) barColor = 'var(--terra-cotta)';
                        else if (scorePct < 80) barColor = '#f5a623'; // Optional middle color

                        const html = `
                        <div class="report-card">
                            <div class="report-info">
                                <h3>${comp.quizTitle}</h3>
                                <p>Assignment ID: ${comp.quizId}</p>
                            </div>
                            <div class="report-score-box">
                                <div class="score-bar-bg">
                                    <div class="score-bar-fill" style="width: ${scorePct}%; background: ${barColor};"></div>
                                </div>
                                <div class="score-text" style="color: ${barColor};">${scorePct}%</div>
                            </div>
                        </div>
                        `;
                        reportGrid.insertAdjacentHTML('beforeend', html);
                    });

                    if (totalMax > 0) {
                        const overall = Math.round((totalScore / totalMax) * 100);
                        const gradeEl = document.getElementById('overall-grade');
                        gradeEl.textContent = overall + '%';
                        if (overall < 60) gradeEl.style.color = 'var(--terra-cotta)';
                    }
                } else {
                    reportGrid.innerHTML = '<div class="empty-state">No completed assignments to report yet.</div>';
                }

            } catch (err) {
                console.error("Failed to load grades:", err);
            }
        });
    </script>
</body>

</html>
