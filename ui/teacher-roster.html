<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structured Canvas - Roster</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .roster-container {
            max-width: 1000px;
            padding: 3rem;
            margin: 0 auto;
            width: 100%;
        }

        .header-section {
            margin-bottom: 3rem;
        }

        .header-section h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            line-height: 1.1;
        }

        .header-section p {
            font-family: var(--font-data);
            color: var(--ink-light);
            font-size: 1rem;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--font-data);
            border: 2px solid var(--ink-black);
            background: var(--surface-white);
            box-shadow: var(--hard-shadow);
        }

        .data-table th,
        .data-table td {
            padding: 1rem 1.5rem;
            text-align: left;
            border-bottom: 1px solid var(--ink-black);
            border-right: 1px solid var(--ink-black);
        }

        .data-table th {
            background: var(--bg-oatmeal);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .data-table td:last-child,
        .data-table th:last-child {
            border-right: none;
        }

        .student-avatar {
            width: 32px;
            height: 32px;
            border: 2px solid var(--ink-black);
            background-color: var(--forest-pine);
            color: var(--surface-white);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            margin-right: 10px;
            vertical-align: middle;
        }

        .badge-status {
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--surface-white);
            background: var(--ink-black);
        }

        .badge-warning {
            background: var(--terra-cotta);
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon"></div>
            Struct
        </div>

        <div class="nav-group">
            <div class="nav-label">Workspace</div>
            <a href="/teacher-dashboard.html" class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="3" y1="9" x2="21" y2="9"></line>
                    <line x1="9" y1="21" x2="9" y2="9"></line>
                </svg>
                Dashboard
            </a>
            <a href="/quiz-builder.html" class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                Quiz Builder
            </a>
            <a href="/teacher-roster.html" class="nav-item active">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                Roster
            </a>
        </div>

        <div class="nav-group" style="margin-top: auto; margin-bottom: 0;">
            <a href="/index.html" class="nav-item" style="color: var(--terra-cotta); border-color: transparent;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Switch Role
            </a>
        </div>
    </aside>

    <main class="main-canvas">

        <header class="topbar">
            <div class="breadcrumb">
                WORKSPACE / <span>COURSE ROSTER</span>
            </div>
            <button class="btn-create" onclick="window.location.href='/quiz-builder.html'">+ New Quiz Block</button>
        </header>

        <div class="roster-container">

            <div class="header-section">
                <h1>Student Directory</h1>
                <p>Manage enrolled students and view their aggregate academic standing.</p>
            </div>

            <table class="data-table">
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th>Student ID</th>
                        <th>Avg Score</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="roster-body">
                    <!-- Populated via JS -->
                </tbody>
            </table>

        </div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const rosterBody = document.getElementById('roster-body');
            try {
                // Fetch recent submissions as a proxy for the student list since there is no native users endpoint.
                const data = await window.StructAPI.getTeacherDashboard();

                let students = [];

                if (data.recentSubmissions && data.recentSubmissions.length > 0) {
                    // Deduplicate by name
                    const uniqueStudents = {};
                    data.recentSubmissions.forEach((sub, i) => {
                        if (!uniqueStudents[sub.studentName]) {
                            uniqueStudents[sub.studentName] = {
                                name: sub.studentName,
                                id: "S00" + (i + 1),
                                score: Math.round(sub.score)
                            };
                        } else {
                            uniqueStudents[sub.studentName].score = Math.round((uniqueStudents[sub.studentName].score + sub.score) / 2);
                        }
                    });
                    students = Object.values(uniqueStudents);
                }

                // Fallback mock students if no submissions exist
                if (students.length === 0) {
                    students = [
                        { name: "Luke Crain", id: "S001", score: 92 },
                        { name: "Eleanor Vance", id: "S002", score: 88 },
                        { name: "Theo Crain", id: "S003", score: 71 },
                        { name: "Shirley Jackson", id: "S004", score: 25 }
                    ];
                }

                students.forEach(s => {
                    const tr = document.createElement('tr');
                    const initials = s.name.split(' ').map(n => n[0]).join('').toUpperCase();

                    let statusHtml = '<span class="badge-status">On Track</span>';
                    if (s.score < 60) {
                        statusHtml = '<span class="badge-status badge-warning">At Risk</span>';
                    }

                    tr.innerHTML = `
                        <td style="font-weight: 700;">
                            <div class="student-avatar">${initials}</div>
                            ${s.name}
                        </td>
                        <td style="color: var(--ink-light);">${s.id}</td>
                        <td style="font-family: var(--font-display); font-weight: 700;">${s.score}%</td>
                        <td>${statusHtml}</td>
                    `;
                    rosterBody.appendChild(tr);
                });

            } catch (err) {
                console.error("Failed to load roster data:", err);
                rosterBody.innerHTML = '<tr><td colspan="4" style="text-align: center;">Error loading roster.</td></tr>';
            }
        });
    </script>
</body>

</html>
